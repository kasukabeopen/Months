<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Month Bounce Challenge</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  overflow:hidden;
  background:linear-gradient(to bottom,#87ceeb,#ffe082);
}

canvas{
  display:block;
}

#menu,#gameOver{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.95);
  padding:30px;
  border-radius:20px;
  width:340px;
  text-align:center;
  z-index:10;
}

h1{
  color:#ff5722;
  margin-bottom:15px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:2px solid orange;
  font-size:16px;
}

button{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:12px;
  background:#ff9800;
  color:white;
  font-size:18px;
  cursor:pointer;
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-size:20px;
  text-shadow:2px 2px 5px black;
  z-index:5;
}

#monthDisplay{
  position:absolute;
  top:20px;
  width:100%;
  text-align:center;
  font-size:52px;
  font-weight:bold;
  color:white;
  text-shadow:2px 2px 5px black;
  z-index:5;
}

#progress{
  position:absolute;
  bottom:30px;
  width:100%;
  text-align:center;
  font-size:40px;
  letter-spacing:10px;
  color:yellow;
  text-shadow:2px 2px 5px black;
  z-index:5;
}

#feedback{
  position:absolute;
  top:120px;
  width:100%;
  text-align:center;
  font-size:40px;
  font-weight:bold;
  color:#00ff66;
  text-shadow:2px 2px 5px black;
  z-index:20;
}

#gameOver{
  display:none;
}
</style>
</head>

<body>

<div id="menu">
  <h1>🍉 Month Bounce Challenge 🍍</h1>

  <input type="text" id="playerName" placeholder="Enter your name">

  <select id="speedSelect">
    <option value="slow">🐢 Slow</option>
    <option value="normal" selected>⚡ Normal</option>
    <option value="fast">🚀 Fast</option>
  </select>

  <button onclick="startGame()">Start Game</button>
</div>

<div id="gameOver">
  <h1>🎉 Game Over 🎉</h1>
  <p id="finalStats"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<div id="ui"></div>
<div id="monthDisplay"></div>
<div id="progress"></div>
<div id="feedback"></div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const months=[
"JANUARY","FEBRUARY","MARCH","APRIL",
"MAY","JUNE","JULY","AUGUST",
"SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"
];

let shuffledMonths=[];
let currentStage=0;
let currentMonth="";
let currentLetterIndex=0;
let fruits=[];
let score=0;
let mistakes=0;
let playerName="";
let gameSpeed=1;
let gameStarted=false;
let startTime;
let stageTransition=false;

/* 🔊 SPEECH FUNCTION */
function speak(text){
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  utter.rate = 0.9;
  speechSynthesis.speak(utter);
}

class Fruit{
  constructor(letter,correct,type="normal"){

    this.x=Math.random()*(canvas.width-200)+100;
    this.y=Math.random()*(canvas.height-300)+150;

    this.radius=55;

    this.letter=letter;
    this.correct=correct;
    this.type=type;

    this.speedX=(Math.random()*6-3)*gameSpeed;
    this.speedY=(Math.random()*6-3)*gameSpeed;

    this.clicked=false;
    this.zoom=1;

    this.color=`hsl(${Math.random()*360},80%,60%)`;
  }

  draw(){

    ctx.save();

    if(this.clicked){
      ctx.translate(this.x,this.y);
      ctx.scale(this.zoom,this.zoom);
      ctx.translate(-this.x,-this.y);
    }

    ctx.beginPath();

    if(this.type==="bonus") ctx.fillStyle="gold";
    else if(this.type==="minus") ctx.fillStyle="red";
    else ctx.fillStyle=this.color;

    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="white";
    ctx.font="bold 48px Arial";
    ctx.textAlign="center";
    ctx.textBaseline="middle";

    ctx.fillText(this.letter,this.x,this.y);

    ctx.restore();
  }

  update(){

    if(this.clicked && this.zoom<1.3){
      this.zoom+=0.08;
    }

    this.x+=this.speedX;
    this.y+=this.speedY;

    if(this.x<this.radius || this.x>canvas.width-this.radius){
      this.speedX*=-1;
    }

    if(this.y<this.radius || this.y>canvas.height-this.radius){
      this.speedY*=-1;
    }
  }
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function startGame(){

  playerName=document.getElementById("playerName").value||"Player";

  const speed=document.getElementById("speedSelect").value;

  if(speed==="slow") gameSpeed=1.2;
  if(speed==="normal") gameSpeed=1.8;
  if(speed==="fast") gameSpeed=2.6;

  document.getElementById("menu").style.display="none";

  shuffledMonths=shuffle([...months]);

  gameStarted=true;
  startTime=Date.now();

  nextStage();
  animate();
}

function nextStage(){

  if(currentStage>=shuffledMonths.length){
    endGame();
    return;
  }

  currentMonth=shuffledMonths[currentStage];
  currentLetterIndex=0;

  updateUI();

  stageTransition=true;

  setTimeout(()=>{
    stageTransition=false;
    spawnFruits();
  },1500);
}

function spawnFruits(){

  fruits=[];

  const target=currentMonth[currentLetterIndex];

  const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const letters=[target];

  while(letters.length<4){
    let r=alphabet[Math.floor(Math.random()*alphabet.length)];
    if(!letters.includes(r)) letters.push(r);
  }

  shuffle(letters);

  letters.forEach(l=>{
    fruits.push(new Fruit(l,l===target));
  });

  if(Math.random()<0.4) fruits.push(new Fruit("⭐",false,"bonus"));
  if(Math.random()<0.3) fruits.push(new Fruit("💀",false,"minus"));
}

function updateUI(){

  document.getElementById("ui").innerHTML=`
  👤 ${playerName}<br>
  ⭐ ${score}<br>
  ❌ ${mistakes}<br>
  🎯 Stage ${currentStage+1}/12
  `;

  document.getElementById("monthDisplay").innerHTML=currentMonth;

  let txt="";
  for(let i=0;i<currentMonth.length;i++){
    txt+=i<currentLetterIndex?currentMonth[i]+" ":"_ ";
  }
  document.getElementById("progress").innerHTML=txt;
}

function feedback(msg,color){
  const fb=document.getElementById("feedback");
  fb.innerHTML=msg;
  fb.style.color=color||"white";
  setTimeout(()=>fb.innerHTML="",700);
}

function vibrate(){
  if(navigator.vibrate) navigator.vibrate(120);
}

function clickFruit(x,y){

  let hit=false;

  fruits.forEach(f=>{

    let dx=x-f.x;
    let dy=y-f.y;

    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<f.radius){

      hit=true;

      vibrate();

      speak(f.letter); // 🔊 LETTER SOUND

      f.clicked=true;
      setTimeout(()=>{f.clicked=false;f.zoom=1;},150);

      if(f.type==="bonus"){
        score+=300;
        feedback("BONUS ⭐","gold");
        fruits=fruits.filter(x=>x!==f);
        updateUI();
        return;
      }

      if(f.type==="minus"){
        score-=150;
        mistakes++;
        feedback("OUCH 💀","red");
        fruits=fruits.filter(x=>x!==f);
        updateUI();
        return;
      }

      if(f.correct){
        score+=100;
        currentLetterIndex++;

        feedback("CORRECT ✅","#00ff66");

        if(currentLetterIndex>=currentMonth.length){
          score+=200;
          currentStage++;
          nextStage();
        }else{
          spawnFruits();
          updateUI();
        }
      }else{
        score-=20;
        mistakes++;
        feedback("WRONG ❌","orange");
        updateUI();
      }
    }
  });

  if(!hit) feedback("MISS 👀","white");
}

canvas.addEventListener("click",e=>{
  if(!gameStarted||stageTransition) return;
  clickFruit(e.clientX,e.clientY);
});

function drawBG(){
  for(let i=0;i<15;i++){
    ctx.beginPath();
    ctx.fillStyle=`hsla(${i*20},80%,70%,0.12)`;
    ctx.arc((i*120+Date.now()/30)%canvas.width,(i*90)%canvas.height,40,0,Math.PI*2);
    ctx.fill();
  }
}

function animate(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBG();

  if(stageTransition){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";
    ctx.font="bold 90px Arial";
    ctx.textAlign="center";

    ctx.fillText("STAGE",canvas.width/2,canvas.height/2-20);
    ctx.fillText(currentStage+1,canvas.width/2,canvas.height/2+90);

    requestAnimationFrame(animate);
    return;
  }

  fruits.forEach(f=>{
    f.update();
    f.draw();
  });

  requestAnimationFrame(animate);
}

function endGame(){
  gameStarted=false;

  let time=Math.floor((Date.now()-startTime)/1000);

  document.getElementById("gameOver").style.display="block";

  document.getElementById("finalStats").innerHTML=`
  👤 ${playerName}<br>
  ⭐ Score: ${score}<br>
  ❌ Mistakes: ${mistakes}<br>
  ⏱️ ${time}s
  `;
}

window.addEventListener("resize",()=>{
  canvas.width=innerWidth;
  canvas.height=innerHeight;
});
</script>

</body>
</html>
