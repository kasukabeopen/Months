<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Month Slice Challenge</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  overflow: hidden;
  background: linear-gradient(to bottom, #87ceeb, #ffe082);
}

canvas {
  display: block;
}

#menu, #gameOver {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.95);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 340px;
  z-index: 20;
}

h1 {
  color: #ff5722;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 2px solid #ff9800;
  font-size: 16px;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: #ff9800;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
  font-size: 20px;
  text-shadow: 2px 2px 5px black;
  z-index: 10;
}

#monthDisplay {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 52px;
  font-weight: bold;
  color: white;
  text-shadow: 2px 2px 5px black;
  z-index: 10;
}

#targetLetter {
  position: absolute;
  bottom: 35px;
  width: 100%;
  text-align: center;
  font-size: 42px;
  letter-spacing: 10px;
  color: yellow;
  text-shadow: 2px 2px 5px black;
  z-index: 10;
}

#feedback {
  position: absolute;
  top: 130px;
  width: 100%;
  text-align: center;
  font-size: 42px;
  font-weight: bold;
  color: #00ff66;
  text-shadow: 2px 2px 5px black;
  z-index: 20;
}

#gameOver {
  display: none;
}
</style>
</head>
<body>

<div id="menu">
  <h1>🍉 Month Slice Challenge 🍍</h1>
  <p>Type your name to begin!</p>

  <input type="text" id="playerName" placeholder="Enter your name">

  <select id="speedSelect">
    <option value="slow">🐢 Slow</option>
    <option value="normal" selected>⚡ Normal</option>
    <option value="fast">🚀 Fast</option>
  </select>

  <button onclick="startGame()">Start Game</button>
</div>

<div id="gameOver">
  <h1>🎉 Game Over 🎉</h1>
  <p id="finalStats"></p>
  <button onclick="location.reload()">Play Again</button>
</div>

<div id="ui"></div>
<div id="monthDisplay"></div>
<div id="targetLetter"></div>
<div id="feedback"></div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const months = [
  'JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
  'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'
];

let shuffledMonths = [];
let currentStage = 0;
let currentMonth = '';
let currentLetterIndex = 0;
let fruits = [];
let score = 0;
let mistakes = 0;
let playerName = '';
let gameStarted = false;
let startTime;
let gameSpeed = 1;
let stageTransition = false;

class Fruit {
  constructor(letter, correct, type='normal') {
    this.x = Math.random() * (canvas.width - 120) + 60;

    this.fromTop = Math.random() < 0.5;

    if (this.fromTop) {
      this.y = -80;
      this.speedY = (Math.random() * 2 + 2) * gameSpeed;
    } else {
      this.y = canvas.height + 80;
      this.speedY = -(Math.random() * 2 + 2) * gameSpeed;
    }

    this.speedX = (Math.random() * 1.5 - 0.75) * gameSpeed;

    this.radius = 55;
    this.letter = letter;
    this.correct = correct;
    this.type = type;
    this.clicked = false;
    this.zoomScale = 1;

    this.color = `hsl(${Math.random()*360},80%,60%)`;
  }

  draw() {
    ctx.save();

    if (this.clicked) {
      ctx.translate(this.x, this.y);
      ctx.scale(this.zoomScale, this.zoomScale);
      ctx.translate(-this.x, -this.y);
    }

    ctx.beginPath();

    if (this.type === 'bonus') {
      ctx.fillStyle = 'gold';
    } else if (this.type === 'minus') {
      ctx.fillStyle = 'red';
    } else {
      ctx.fillStyle = this.color;
    }

    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'white';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(this.letter, this.x, this.y);

    ctx.restore();
  }

  update() {
    if (this.clicked && this.zoomScale < 1.35) {
      this.zoomScale += 0.08;
    }

    this.x += this.speedX;
    this.y += this.speedY;

    // Respawn fruits if they go off screen
    if (this.fromTop && this.y > canvas.height + 120) {
      this.y = -80;
    }

    if (!this.fromTop && this.y < -120) {
      this.y = canvas.height + 80;
    }
  }
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function startGame() {
  playerName = document.getElementById('playerName').value || 'Player';

  const speedChoice = document.getElementById('speedSelect').value;

  if (speedChoice === 'slow') gameSpeed = 0.7;
  if (speedChoice === 'normal') gameSpeed = 1;
  if (speedChoice === 'fast') gameSpeed = 1.35;

  document.getElementById('menu').style.display = 'none';

  shuffledMonths = shuffle([...months]);

  gameStarted = true;
  startTime = Date.now();

  nextStage();
  animate();
}

function showStageScreen() {
  stageTransition = true;

  setTimeout(() => {
    stageTransition = false;
    spawnFruits();
  }, 2000);
}

function nextStage() {
  if (currentStage >= shuffledMonths.length) {
    endGame();
    return;
  }

  currentMonth = shuffledMonths[currentStage];
  currentLetterIndex = 0;

  updateUI();
  showStageScreen();
}

function spawnFruits() {
  fruits = [];

  // Force letters to always appear
  const target = currentMonth[currentLetterIndex];

  const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const letters = [target];

  while (letters.length < 4) {
    const randomLetter = alphabet[Math.floor(Math.random() * alphabet.length)];

    if (!letters.includes(randomLetter)) {
      letters.push(randomLetter);
    }
  }

  shuffle(letters);

  letters.forEach(letter => {
    fruits.push(new Fruit(letter, letter === target));
  });

  if (Math.random() < 0.4) {
    fruits.push(new Fruit('⭐', false, 'bonus'));
  }

  if (Math.random() < 0.3) {
    fruits.push(new Fruit('💀', false, 'minus'));
  }
}

function updateUI() {
  document.getElementById('ui').innerHTML = `
    👤 ${playerName}<br>
    ⭐ Score: ${score}<br>
    ❌ Mistakes: ${mistakes}<br>
    🎯 Stage: ${currentStage + 1}/12
  `;

  document.getElementById('monthDisplay').innerHTML = currentMonth;

  let blanks = '';

  for (let i = 0; i < currentMonth.length; i++) {
    if (i < currentLetterIndex) {
      blanks += currentMonth[i] + ' ';
    } else {
      blanks += '_ ';
    }
  }

  document.getElementById('targetLetter').innerHTML = blanks;
}

function drawBackgroundFruits() {
  for (let i = 0; i < 18; i++) {
    ctx.beginPath();
    ctx.fillStyle = `hsla(${i*20},80%,70%,0.15)`;
    ctx.arc((i*120 + Date.now()/25)%canvas.width, (i*70)%canvas.height, 40, 0, Math.PI*2);
    ctx.fill();
  }
}

function showFeedback(message, color='#00ff66') {
  const feedback = document.getElementById('feedback');

  feedback.innerHTML = message;
  feedback.style.color = color;

  setTimeout(() => {
    feedback.innerHTML = '';
  }, 800);
}

function vibrateDevice() {
  try {
    if (navigator.vibrate) {
      navigator.vibrate(200);
    }
  } catch(e) {
    console.log('No vibration support');
  }
}

function clickFruit(x, y) {
  let clickedSomething = false;

  fruits.forEach((fruit) => {
    const dx = x - fruit.x;
    const dy = y - fruit.y;

    const distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < fruit.radius) {
      clickedSomething = true;

      vibrateDevice();

      fruit.clicked = true;

      setTimeout(() => {
        fruit.clicked = false;
        fruit.zoomScale = 1;
      }, 150);

      if (fruit.type === 'bonus') {
        score += 300;
        showFeedback('BONUS! ⭐ +300', 'gold');
        updateUI();
        return;
      }

      if (fruit.type === 'minus') {
        score -= 150;
        mistakes++;
        showFeedback('OUCH! 💀 -150', 'red');
        updateUI();
        return;
      }

      if (fruit.correct) {
        score += 100;
        currentLetterIndex++;

        showFeedback('CORRECT! ✅', '#00ff66');

        if (currentLetterIndex >= currentMonth.length) {
          score += 200;
          currentStage++;

          showFeedback('MONTH COMPLETE! 🎉', '#00e5ff');

          nextStage();
        } else {
          spawnFruits();
          updateUI();
        }
      } else {
        score -= 20;
        mistakes++;

        showFeedback('WRONG LETTER ❌', 'orange');
        updateUI();
      }
    }
  });

  if (!clickedSomething) {
    showFeedback('MISS! 👀', '#ffffff');
  }
}

canvas.addEventListener('click', e => {
  if (!gameStarted || stageTransition) return;

  clickFruit(e.clientX, e.clientY);
});

canvas.addEventListener('touchstart', e => {
  if (!gameStarted || stageTransition) return;

  const touch = e.touches[0];
  clickFruit(touch.clientX, touch.clientY);
});

function animate() {
  // Main game loop
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBackgroundFruits();

  if (stageTransition) {
    ctx.fillStyle = '#000000';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const scale = 1 + Math.sin(Date.now()/180) * 0.08;

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(scale, scale);

    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur = 25;

    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.font = 'bold 90px Arial';
    ctx.fillText('STAGE', 0, -20);

    ctx.fillStyle = '#ffe600';
    ctx.font = 'bold 120px Arial';
    ctx.fillText(currentStage + 1, 0, 110);

    ctx.restore();

    requestAnimationFrame(animate);
    return;
  }

  for (let fruit of fruits) {
    fruit.update();
    fruit.draw();
  }

  requestAnimationFrame(animate);
}

function endGame() {
  gameStarted = false;

  const totalTime = Math.floor((Date.now() - startTime) / 1000);

  document.getElementById('gameOver').style.display = 'block';

  document.getElementById('finalStats').innerHTML = `
    👤 ${playerName}<br><br>
    ⭐ Final Score: ${score}<br>
    ❌ Mistakes: ${mistakes}<br>
    ⏱️ Time: ${totalTime} seconds
  `;
}

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
